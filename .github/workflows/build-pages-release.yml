name: Build, Pages, Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build standalone app
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node for syntax checks
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify generated artifacts
        run: python3 tools/build.py --check

      - name: Syntax check JavaScript sources
        run: |
          node --check src/app.js
          node --check src/canvas-readback-patch.js
          node --check models/embedded-models.js

      - name: Prepare distributable
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp README.md dist/README.md

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: facetrace-standalone
          path: dist
          if-no-files-found: error

  pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: facetrace-standalone
          path: site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: facetrace-standalone
          path: release

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              release/index.html \
              release/README.md \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              release/index.html \
              release/README.md \
              --title "FaceTrace Offline $GITHUB_REF_NAME" \
              --notes "Standalone offline FaceTrace HTML build. Download index.html and open it locally, or use the GitHub Pages deployment."
          fi
